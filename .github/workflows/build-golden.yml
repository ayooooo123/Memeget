name: Build eval golden set

# Builds a real search-quality golden set for the eval harness: pulls memes from
# memedepot, embeds each image + a query with CLIP ViT-B/32 (the app's space),
# and opens a PR with tools/eval/golden.json. Runs in CI because it needs both
# network access to memedepot (egress-blocked in the dev sandbox) and a real
# torch/CLIP toolchain. Writes vectors + ids only — never images.

on:
  workflow_dispatch:
    inputs:
      depots:
        description: 'How many depots to sample'
        default: '25'
      per_depot:
        description: 'Memes per depot'
        default: '8'

concurrency:
  group: build-golden
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true

      - name: Install CLIP toolchain (CPU)
        env:
          PIP_NO_CACHE_DIR: '1'
        run: |
          pip install --upgrade pip
          # torch AND torchvision from the SAME CPU index so their compiled ops
          # match — installing them separately (or letting open_clip pull
          # torchvision from PyPI) yields "operator torchvision::nms does not
          # exist". open_clip is installed after, so it reuses this torchvision.
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install open_clip_torch pillow requests
          python -c "import torch, torchvision; print('torch', torch.__version__, '| torchvision', torchvision.__version__)"

      - name: Build golden set
        run: |
          python tools/eval/build_golden.py \
            --out tools/eval/golden.json \
            --depots "${{ github.event.inputs.depots || '25' }}" \
            --per-depot "${{ github.event.inputs.per_depot || '8' }}"

      - name: Open PR with golden set
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/eval-golden
          base: main
          add-paths: tools/eval/golden.json
          commit-message: 'chore(eval): refresh golden set'
          title: 'chore(eval): refresh golden set'
          body: |
            Real CLIP-embedded golden set from memedepot memes, built by
            `tools/eval/build_golden.py`. Vectors + ids only (no images).
            `npm run eval` scores against it. Review the Recall@k / MRR it
            reports, then merge to lock in a baseline.
          delete-branch: true
